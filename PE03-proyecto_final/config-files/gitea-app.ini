; ============================================================
; Configuración de Gitea (app.ini)
; Servidor Git ligero con interfaz web
;
; __SERVER_IP__ se reemplaza automáticamente por la IP real
; durante el provisioning (sed en gitea.sh)
; ============================================================

[server]
; Configuración del servidor web
DOMAIN           = __SERVER_IP__
HTTP_PORT        = 3000
ROOT_URL         = http://__SERVER_IP__:3000/
DISABLE_SSH      = false
SSH_PORT         = 22
LFS_START_SERVER = false

[database]
; Usamos SQLite por simplicidad (no requiere servidor de BD externo)
DB_TYPE  = sqlite3
PATH     = /var/lib/gitea/data/gitea.db

[repository]
; Directorio donde se almacenan los repositorios Git
ROOT = /home/git/gitea-repositories
; Rama por defecto al crear repositorios
DEFAULT_BRANCH = master

[security]
; INSTALL_LOCK=true evita que aparezca el instalador web
INSTALL_LOCK = true
SECRET_KEY   = pe03-secret-key-cicd-2024

[service]
; Permitir registro de usuarios (false para más seguridad)
DISABLE_REGISTRATION = false
REQUIRE_SIGNIN_VIEW  = false

[log]
; Nivel de logging
MODE      = console
LEVEL     = Info

[webhook]
; Permitir webhooks a cualquier host (necesario para Jenkins)
ALLOWED_HOST_LIST = *
