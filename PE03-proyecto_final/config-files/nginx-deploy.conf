# ============================================================
# Configuración de Nginx para el servidor de despliegue
# Sirve la aplicación web desplegada por Jenkins
# ============================================================

server {
    # Escuchar en el puerto 80 (HTTP)
    listen 80 default_server;
    listen [::]:80 default_server;

    # Directorio raíz donde Jenkins copia los archivos
    root /var/www/html;

    # Archivo por defecto
    index index.html;

    # Nombre del servidor (acepta cualquiera)
    server_name _;

    # Servir archivos estáticos
    location / {
        try_files $uri $uri/ =404;
    }

    # Cabecera personalizada para identificar el servidor
    add_header X-Served-By "PE03-Deploy-Server" always;
}
